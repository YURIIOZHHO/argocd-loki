loki:
  storage:
    type: "s3"
    s3:
      region: eu-central-1
    bucketNames:
      chunks: loki-s3-bucket-13-03-2026
      ruler: loki-s3-bucket-13-03-2026
      admin: loki-s3-bucket-13-03-2026

  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  ingester:
    chunk_encoding: snappy # це дефолт з документації
    # тут ми визначаємо за яких умов будуть писатись логи в s3. Це маленькі значення так його точно не треба залишати, я його для тесту робив. Воно по хорошому має бути ну хочаб 1г +
    chunk_idle_period: 3m # якщо 3 хв не буде отримуватись нових логів, то ми записуємо в s3
    max_chunk_age: 3m # час життя чанка(невеликий блок логів), тобто воно повинно після 3 хв життя цього чанку записати його в s3 
    chunk_target_size: 1572864 # size of chunk(in bytes) - і це здається дефолтний розмір

  querier:
    # Default is 4, if you have enough memory and CPU you can increase, reduce if OOMing
    max_concurrent: 4
  pattern_ingester:
    enabled: true
  limits_config:
    allow_structured_metadata: true
    volume_enabled: true
    retention_period: 168h


deploymentMode: Distributed

ingester:
  replicas: 3
  # max_chunk_age: 3m # All chunks will be flushed when they hit this age, default is 1h
  # chunk_idle_period: 3m  # Any chunk not receiving new logs in this time will be flushed
  zoneAwareReplication:
     enabled: false

# більша частина самих компонентів взята з документації, але налаштування ресурсів кастомне і їх треба буде дивитися.

querier:
  replicas: 3 # Improve query performance via parallelism
  maxUnavailable: 2
queryFrontend:
  replicas: 2
  maxUnavailable: 1
queryScheduler:
  replicas: 2

distributor:
  replicas: 3
  maxUnavailable: 2
  resources:
    limits:
      cpu: 500m
      memory: 500Mi
    requests:
      cpu: 100m
      memory: 256Mi

chunksCache:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 512Mi   
    limits:
      cpu: 500m
      memory: 1Gi    
  memcached:
    chunk_size: 512


memcachedIndexQueries:
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 500Mi
    limits:
      cpu: 500m
      memory: 1Gi
  enabled: true

memcachedExporter:
  enabled: true
  resources:
    limits:
      cpu: 150m
      memory: 80Mi
    requests:
      cpu: 100m
      memory: 50Mi

compactor:
  replicas: 1
indexGateway:
  replicas: 2
  maxUnavailable: 1

bloomPlanner:
  replicas: 0
bloomBuilder:
  replicas: 0
bloomGateway:
  replicas: 0

backend:
   replicas: 0
read:
   replicas: 0
write:
   replicas: 0

singleBinary:
   replicas: 0

 # This exposes the Loki gateway so it can be written to and queried externaly

gateway:
   service:
     type: LoadBalancer



