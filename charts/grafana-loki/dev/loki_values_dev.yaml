loki:
  storage:
    type: "s3"
    s3:
      region: eu-central-1
    bucketNames:
      chunks: loki-s3-bucket-13-03-2026
      ruler: loki-s3-bucket-13-03-2026
      admin: loki-s3-bucket-13-03-2026

  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  ingester:
    chunk_encoding: snappy
  querier:
    # Default is 4, if you have enough memory and CPU you can increase, reduce if OOMing
    max_concurrent: 4
  pattern_ingester:
    enabled: true
  limits_config:
    allow_structured_metadata: true
    volume_enabled: true


deploymentMode: Distributed

ingester:
  replicas: 3
  # max_chunk_age: 3m # All chunks will be flushed when they hit this age, default is 1h
  # chunk_idle_period: 3m  # Any chunk not receiving new logs in this time will be flushed
  zoneAwareReplication:
     enabled: false

querier:
  replicas: 3 # Improve query performance via parallelism
  maxUnavailable: 2
queryFrontend:
  replicas: 2
  maxUnavailable: 1
queryScheduler:
  replicas: 2

distributor:
  replicas: 3
  maxUnavailable: 2
  resources:
    limits:
      cpu: 500m
      memory: 500Mi
    requests:
      cpu: 100m
      memory: 256Mi

chunksCache:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 512Mi   
    limits:
      cpu: 500m
      memory: 1Gi    
  memcached:
    chunk_size: 512


memcachedIndexQueries:
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 500Mi
    limits:
      cpu: 500m
      memory: 1Gi
  enabled: true

memcachedExporter:
  enabled: true
  resources:
    limits:
      cpu: 100m
      memory: 50Mi
    requests:
      cpu: 100m
      memory: 50Mi

memcachedFrontend:
  nodeSelector:
    lifecycle: spot
  serviceMonitor:
    enabled: true
    labels:
      release: kube-prometheus-stack
    interval: 30s

compactor:
  replicas: 1
indexGateway:
  replicas: 2
  maxUnavailable: 1

bloomPlanner:
  replicas: 0
bloomBuilder:
  replicas: 0
bloomGateway:
  replicas: 0

backend:
   replicas: 0
read:
   replicas: 0
write:
   replicas: 0

singleBinary:
   replicas: 0

 # This exposes the Loki gateway so it can be written to and queried externaly

gateway:
   service:
     type: LoadBalancer



