datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-server.grafana-loki.svc.cluster.local
        access: proxy
        isDefault: true
      - name: Loki
        type: loki
        url: http://loki-gateway.grafana-loki.svc.cluster.local
        access: proxy
        jsonData:
          httpHeaderName1: "X-Scope-OrgID" # обов'язково повинно бути для multi-tenant підтримки
        secureJsonData:
          httpHeaderValue1: "local" # цей заголовок пов'язаний з налаштуваннями в alloy_values_dev.
        isDefault: false
        
